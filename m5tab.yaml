switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7

  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2

  # Wake Word Sound Switch.
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

 # Even with backlight off, you can apparently get burn in. This prevents it, but runs as night (when backlight is off, so you don't see it)   See later for the nighttime schedule.

  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
binary_sensor: #Some sensors from HA, not using the TV one at the moment.



  - platform: homeassistant
    id: tv_r
    entity_id: media_player.samsung_tv
    trigger_on_initial_state: true


  - platform: homeassistant
    id: office_pendant
    entity_id: light.office_pendant
    publish_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
          id: light_btn
          state:
            checked: !lambda return x;

  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7



text_sensor:

  - platform: homeassistant
    id: thermostat_hvac_mode
    entity_id: climate.hallway
    
  - platform: homeassistant
    id: thermostat_preset
    entity_id: climate.hallway
    attribute: preset_mode

  - platform: homeassistant
    id: media_player_state
    entity_id: media_player.jarvis_lounge_media_player
    on_value:
      then:
        - lambda: |-
            std::string state = id(media_player_state).state;
            ESP_LOGI("media", "Media player state: %s", state.c_str());
            
            if (state == "playing") {
              lv_obj_clear_flag(id(media_card), LV_OBJ_FLAG_HIDDEN);
            } else if (state == "paused") {
              // Keep visible when paused
              lv_obj_clear_flag(id(media_card), LV_OBJ_FLAG_HIDDEN);
            } else {
              // Hide when idle/off
              lv_obj_add_flag(id(media_card), LV_OBJ_FLAG_HIDDEN);
            }

  - platform: homeassistant
    id: media_title
    entity_id: media_player.jarvis_lounge_media_player  # Change to your media player
    attribute: media_title
    on_value:
      then:
        - lambda: |-
            if (id(media_title).state.length() > 0) {
              lv_label_set_text(id(media_title_label), id(media_title).state.c_str());
              lv_obj_clear_flag(id(media_card), LV_OBJ_FLAG_HIDDEN);
            }
            
  - platform: homeassistant
    id: media_artist
    entity_id: media_player.jarvis_lounge_media_player
    attribute: media_artist
    on_value:
      then:
        - lambda: |-
            if (id(media_artist).state.length() > 0) {
              lv_label_set_text(id(media_artist_label), id(media_artist).state.c_str());
            }
            
  - platform: homeassistant
    id: media_album
    entity_id: media_player.jarvis_lounge_media_player
    attribute: media_album
    on_value:
      then:
        - lambda: |-
            if (id(media_album).state.length() > 0) {
              lv_label_set_text(id(media_album_label), id(media_album).state.c_str());
            }
            
  - platform: homeassistant
    id: media_artwork_url
    entity_id: media_player.jarvis_lounge_media_player
    attribute: entity_picture
    on_value:
      then:
        - lambda: |-
            if (id(media_artwork_url).state.length() > 0) {
              // Build full URL
              std::string full_url = "http://192.168.0.7:8123" + id(media_artwork_url).state;
              ESP_LOGI("media", "New artwork URL: %s", full_url.c_str());
              
              // Trigger artwork download via Home Assistant automation
              // Or call service directly here
            }

  - platform: homeassistant
    name: forecast
    id: conditionswd
    entity_id: weather.pirateweather
    internal: true
    on_value:
      - lambda: |-
          // Helper function to convert ESPHome Color to LVGL color
          auto esp_to_lv = [](esphome::Color c) {
            return lv_color_make(c.r, c.g, c.b);
          };
          std::string condition = id(conditionswd).state;
          const char* icon = "\U000F0590"; // Default to cloudy
          
          if (condition == "clear-night") {
            icon = "\U000F0594"; // Night Time Clear
          } else if (condition == "cloudy") {
            icon = "\U000F0590"; // Cloudy
          } else if (condition == "fog") {
            icon = "\U000F0591"; // Fog
          } else if (condition == "hail" || condition == "sleet") {
            icon = "\U000F067F"; // Sleet
          } else if (condition == "lightning" || condition == "lightning-rainy") {
            icon = "\U000F0593"; // Lightning (if you have it)
          } else if (condition == "partlycloudy") {
            icon = "\U000F0595"; // Partly Cloudy
          } else if (condition == "pouring" || condition == "rainy") {
            icon = "\U000F0596"; // Raining
          } else if (condition == "snowy" || condition == "snowy-rainy") {
            icon = "\U000F0F36"; // Snowing
          } else if (condition == "sunny") {
            icon = "\U000F0599"; // Sunny/Dry
          } else if (condition == "windy" || condition == "exceptional") {
            icon = "\U000F0F30"; // Haze
          }
          
          // Update your LVGL label with the icon
          lv_label_set_text(id(weather_icon_label), icon);
          lv_obj_set_style_text_color(id(weather_icon_label), esp_to_lv(id(cyan)), LV_PART_MAIN);

  - platform: homeassistant
    id: speaker_state
    entity_id: media_player.external_media_player
    on_value:
      then:
        - if:
            condition:
              text_sensor.state:
                id: speaker_state
                state: "playing"
            then:
              - lvgl.animimg.start: anim_id8
            else:
              - lvgl.animimg.stop: anim_id8    
