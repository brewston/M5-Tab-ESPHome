# The code that changes the travel poster every 5 mins.

interval:
  - interval: 5minutes
    then:
      - lambda: |-
          // Pick a random image
          const lv_img_dsc_t* imgs[] = {
            id(rio).get_lv_image_dsc(),
            id(los_angeles).get_lv_image_dsc(),
            id(san_diego).get_lv_image_dsc(),
            id(seville).get_lv_image_dsc(),
            id(venice).get_lv_image_dsc(),
            id(tenerife).get_lv_image_dsc(),
            id(bangkok).get_lv_image_dsc(),
            id(lima).get_lv_image_dsc(),
            id(santiago).get_lv_image_dsc(),
            id(marrakech).get_lv_image_dsc()
          };
          const char* img_names[] = {
            "rio", "los_angeles", "san_diego", 
            "seville", "venice", "tenerife", "bangkok", "lima", 
            "santiago", "marrakech"
          };
          
          int num_images = 10;  
          int r = esp_random() % num_images;
          
          ESP_LOGD("travel", "Changing to image %d: %s", r, img_names[r]);
          
          lv_img_set_src(id(travel_img), imgs[r]);
