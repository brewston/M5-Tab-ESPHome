# sensor for my central heating and the logo changes colour when the heating is on.


  - platform: homeassistant
    id: climate_action
    entity_id: climate.hallway
    attribute: hvac_action
    on_value:
      - lambda: |-
         // Helper function to convert ESPHome Color to LVGL color
          auto esp_to_lv = [](esphome::Color c) {
            return lv_color_make(c.r, c.g, c.b);
          };

          std::string action = id(climate_action).state;
          
          if (action == "heating") {
            lv_obj_set_style_img_recolor_opa(id(hive_img), LV_OPA_70, LV_PART_MAIN);
            lv_obj_set_style_img_recolor(id(hive_img), esp_to_lv(id(orange)), LV_PART_MAIN);
          }  else if (action == "idle") {
            lv_obj_set_style_img_recolor_opa(id(hive_img), LV_OPA_70, LV_PART_MAIN);
            lv_obj_set_style_img_recolor(id(hive_img), esp_to_lv(id(green)), LV_PART_MAIN);
          } else {
            lv_obj_set_style_img_recolor_opa(id(hive_img), LV_OPA_TRANSP, LV_PART_MAIN);
          }

# similarly for the hot water, changes colour too. These are both from the Hive integration in HA

  - platform: homeassistant
    id: water_boiler_operation_mode
    entity_id: binary_sensor.hotwater_state
    #attribute: operation_mode 
    on_value:
      - lambda: |-
          // Helper function to convert ESPHome Color to LVGL color
          auto esp_to_lv = [](esphome::Color c) {
            return lv_color_make(c.r, c.g, c.b);
          };
          
          std::string action = id(water_boiler_operation_mode).state;
          
          if (action == "on") {
            lv_obj_set_style_img_recolor_opa(id(boiler_img), LV_OPA_70, LV_PART_MAIN);
            lv_obj_set_style_img_recolor(id(boiler_img), esp_to_lv(id(orange)), LV_PART_MAIN);
          } else if (action == "off") {
            lv_obj_set_style_img_recolor_opa(id(boiler_img), LV_OPA_70, LV_PART_MAIN);
            lv_obj_set_style_img_recolor(id(boiler_img), esp_to_lv(id(green)), LV_PART_MAIN);
          } else {
            lv_obj_set_style_img_recolor_opa(id(boiler_img), LV_OPA_TRANSP, LV_PART_MAIN);
          }
  - platform: homeassistant
    id: oracle_price
    entity_id: sensor.oracle_2
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("oracle", "Price updated: %s", x.c_str());
            std::string s = x;
            lv_label_set_text(id(oracle_price_label), s.c_str());
  - platform: homeassistant
    id: oracle_change
    entity_id: sensor.orcl_change   
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("oracle", "Change direction: %s", x.c_str());
            
            if (x == "Up") {
              lv_obj_set_style_text_color(id(oracle_price_label), 
                lv_color_make(id(sage_green).r, id(sage_green).g, id(green).b), 
                LV_PART_MAIN);
            } else if (x == "Down") {
              lv_obj_set_style_text_color(id(oracle_price_label), 
                lv_color_make(id(orange).r, id(orange).g, id(red).b), 
                LV_PART_MAIN);
            } else {
              lv_obj_set_style_text_color(id(oracle_price_label), 
                lv_color_make(id(white).r, id(white).g, id(white).b), 
                LV_PART_MAIN);
            }
sensor:
  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      name: Battery Voltage
    current:
      name: Battery Current
      # Positive means discharging
      # Negative means charging



  - platform: homeassistant
    id: lamp_slider
    entity_id: $light_control
    attribute: brightness
    on_value:
      then:
       - lvgl.slider.update:
           id: slider_id2
           value: !lambda return x;




  - platform: homeassistant
    id: light_state
    entity_id: $light_control
    attribute: brightness



  - platform: homeassistant
    id: thermostat_current_temp
    entity_id: climate.hallway
    attribute: current_temperature
    on_value:
      - lambda: |-
          char temp_str[10];
          snprintf(temp_str, sizeof(temp_str), "%.1f°", x);
          lv_label_set_text(id(current_temp_label), temp_str);
    
  - platform: homeassistant
    id: thermostat_target_temp
    entity_id: climate.hallway
    attribute: temperature
    on_value:
      - lambda: |-
          char temp_str[10];
          snprintf(temp_str, sizeof(temp_str), "%.1f°", x);
          lv_label_set_text(id(target_temp_label), temp_str);



time:
  - platform: homeassistant
    id: time_comp
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

 # this it the antiburn schedule previously mentioned.
         
  - platform: homeassistant
    id: ha_time
    on_time:
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn

      - hours: 8
        minutes: 0
        seconds: 0
        then:
            - logger.log: "LVGL is awake"
            - light.turn_on:
                 id: backlight
                 transition_length: 15s

      - hours: 18
        minutes: 0
        seconds: 0
        then:
           - logger.log: "LVGL is idle"
           - light.turn_off:
                 id: backlight
                 transition_length: 15s
           - lvgl.pause:
number:
  - platform: template
    name: m5tab screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 300
    restore_value: true
    min_value: 1
    max_value: 300
    step: 5
    mode: box

  - platform: template
    name: screen brightness
    optimistic: true
    id: brightness_label
    min_value: 8
    max_value: 255
    step: 5
    mode: box
 #   value: 128
    on_value:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return x / 255;'

touchscreen:
  - platform: gt911
    interrupt_pin: GPIO23
    display: my_lcd
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: false
    calibration:
      x_min: 0
      x_max: 1280
      y_min: 0
      y_max: 720
    id: my_touchscreen
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: backlight

esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    id: my_lcd
    dimensions:
      height: 1280
      width: 720
    model: M5Stack-Tab5
   # invert_colors: true
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
   # show_test_card: true

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    default_transition_length: 250ms
    restore_mode: ALWAYS_ON
    initial_state:
      brightness: "50%"

