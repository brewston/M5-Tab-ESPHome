esphome:
  name: m5stack-tab5-v2
  friendly_name: M5Stack Tab5
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288
    board_build.flash_size: 16MB
  includes:
    - <driver/sdspi_host.h>
    - <driver/spi_common.h>
    - <sdmmc_cmd.h>

api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus
  services:
    - service: show_camera_snapshot
      variables:
        url: string
      then:
        - lambda: |-
            // Clean up any previous image first
            if (id(camera_overlay_obj) != nullptr) {
              lv_obj_del(id(camera_overlay_obj));
              id(camera_overlay_obj) = nullptr;
            }
            if (id(image_buffer) != nullptr) {
              free(id(image_buffer));
              id(image_buffer) = nullptr;
            }
            
            ESP_LOGI("camera", "Fetching snapshot from: %s", url.c_str());
            
            #include "esp_http_client.h"
            
            esp_http_client_config_t config = {};
            config.url = url.c_str();
            config.timeout_ms = 10000;
            
            esp_http_client_handle_t client = esp_http_client_init(&config);
            
            ESP_LOGI("camera", "Opening HTTP connection...");
            if (esp_http_client_open(client, 0) == ESP_OK) {
              int content_length = esp_http_client_fetch_headers(client);
              ESP_LOGI("camera", "Content length: %d bytes", content_length);
              
              if (content_length == 240000) {
                id(image_buffer) = (uint8_t*)heap_caps_malloc(content_length, MALLOC_CAP_SPIRAM);
                
                ESP_LOGI("camera", "Buffer allocated: %p", id(image_buffer));
                
                if (id(image_buffer) != nullptr) {
                  int read_len = esp_http_client_read(client, (char*)id(image_buffer), content_length);
                  
                  ESP_LOGI("camera", "Read %d bytes", read_len);
                  
                  if (read_len == 240000) {
                    ESP_LOGI("camera", "Creating overlay...");
                    
                    // Create overlay and store reference
                    id(camera_overlay_obj) = lv_obj_create(lv_scr_act());
                    lv_obj_set_size(id(camera_overlay_obj), LV_PCT(100), LV_PCT(100));
                    lv_obj_set_style_bg_color(id(camera_overlay_obj), lv_color_hex(0x000000), 0);
                    lv_obj_set_style_bg_opa(id(camera_overlay_obj), LV_OPA_COVER, 0);
                    lv_obj_clear_flag(id(camera_overlay_obj), LV_OBJ_FLAG_SCROLLABLE);
                    
                    // Create image
                    lv_obj_t *img_obj = lv_img_create(id(camera_overlay_obj));
                    
                    static lv_img_dsc_t img_dsc;
                    img_dsc.header.cf = LV_COLOR_FORMAT_NATIVE;
                    
                    
                    img_dsc.header.w = 400;
                    img_dsc.header.h = 300;
                    img_dsc.data_size = 240000;
                    img_dsc.data = (uint8_t*)id(image_buffer);
                    
                    lv_img_set_src(img_obj, &img_dsc);
                    lv_obj_align(img_obj, LV_ALIGN_CENTER, 0, 0);
                    
                    ESP_LOGI("camera", "Image displayed!");
                    
                    id(restore_display_timer).execute();
                  }
                }
              }
            }
            esp_http_client_cleanup(client); 
    - service: show_media_artwork
      variables:
        url: string
      then:
        - lambda: |-
            // Clean up previous artwork
            if (id(artwork_buffer) != nullptr) {
              free(id(artwork_buffer));
              id(artwork_buffer) = nullptr;
            }
            
            ESP_LOGI("media", "Fetching artwork from: %s", url.c_str());
            
            esp_http_client_config_t config = {};
            config.url = url.c_str();
            config.timeout_ms = 10000;
            
            esp_http_client_handle_t client = esp_http_client_init(&config);
            
            if (esp_http_client_open(client, 0) == ESP_OK) {
              int content_length = esp_http_client_fetch_headers(client);
              ESP_LOGI("media", "Artwork size: %d bytes", content_length);
              
              if (content_length > 0 && content_length <= 500000) {
                id(artwork_buffer) = (uint8_t*)heap_caps_malloc(content_length, MALLOC_CAP_SPIRAM);
                
                if (id(artwork_buffer) != nullptr) {
                  int read_len = esp_http_client_read(client, (char*)id(artwork_buffer), content_length);
                  
                  if (read_len > 0) {
                    ESP_LOGI("media", "Downloaded %d bytes", read_len);
                    
                    // Clear previous artwork in container
                    lv_obj_clean(id(artwork_container));
                    
                    // Create image in artwork container
                    lv_obj_t *artwork_img = lv_img_create(id(artwork_container));
                    
                    // Setup image descriptor (320x320 RGB565)
                    static lv_img_dsc_t artwork_dsc;
                    artwork_dsc.header.cf = LV_COLOR_FORMAT_NATIVE;
                    
                    
                    artwork_dsc.header.w = 320;
                    artwork_dsc.header.h = 320;
                    artwork_dsc.data_size = read_len;
                    artwork_dsc.data = id(artwork_buffer);
                    
                    lv_img_set_src(artwork_img, &artwork_dsc);
                    lv_obj_align(artwork_img, LV_ALIGN_CENTER, 0, 0);
                    
                    ESP_LOGI("media", "Artwork displayed");
                  }
                }
              }
            }
            esp_http_client_cleanup(client);
  

esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      EXECUTE_FROM_PSRAM: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5
      CONFIG_CAMERA_SC2336: "y"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_SPEED_200M: "y"
      CONFIG_EXAMPLE_ENABLE_CAM_SENSOR_PIC_HFLIP: "y"
      CONFIG_EXAMPLE_ENABLE_CAM_SENSOR_PIC_VFLIP: "y"
      CONFIG_EXAMPLE_VIDEO_BUFFER_TYPE_DRIVER: "y"
      CONFIG_ESP_VIDEO_ENABLE_HW_H264_VIDEO_DEVICE: "y"
      CONFIG_ESP_VIDEO_ENABLE_HW_JPEG_VIDEO_DEVICE: " y"
    advanced:
      enable_idf_experimental_features: true
     # execute_from_psram: true
    components:
      - espressif/esp_hosted^2.7.0
      - espressif/esp_wifi_remote^1.2.2
esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

psram:
  mode: hex
  speed: 200MHz




ota:
  - platform: esphome
    id: ota_esphome

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password

#external_components:
